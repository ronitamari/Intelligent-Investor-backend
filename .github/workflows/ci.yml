name: Backend CI

on:
  push:
    branches: [main, stage, dev]
  pull_request:
    branches: [main, stage, dev]

jobs:
  test:
    name: Unit and integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test -- --runInBand
      - run: npm run test:e2e -- --runInBand
      - run: npm run build

  docker:
    name: Build backend image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: intelligent-investor-backend:${{ github.sha }}

  staging:
    name: Deploy and verify staging
    if: github.ref == 'refs/heads/stage' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: docker
    environment: staging
    steps:
      - name: Trigger staging deployment
        run: curl --fail --request POST "${{ secrets.STAGING_DEPLOY_WEBHOOK }}"
      - name: Verify backend health
        run: |
          for attempt in {1..12}; do
            curl --fail "${{ secrets.STAGING_API_URL }}/health" && exit 0
            sleep 10
          done
          exit 1
